name: ZIP Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. v1.2.3). Defaults to 'manual' if omitted."
        required: false
        default: "0.0.0"

env:
  RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

jobs:
  build-backend:
    name: Build backend archive
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version-file: backend/.nvmrc
          cache: yarn
          cache-dependency-path: backend/yarn.lock

      - name: Set version from tag
        run: npm pkg set version="${RELEASE_VERSION#v}"
        working-directory: backend

      - name: Install dependencies
        working-directory: backend
        run: yarn install --immutable

      - name: Generate Prisma client
        working-directory: backend
        run: yarn prisma generate

      - name: Build
        working-directory: backend
        run: yarn build

      - name: Install production dependencies only
        working-directory: backend
        run: yarn workspaces focus --production

      - name: Create archive
        working-directory: backend
        run: |
          zip -r "../backend-${{ env.RELEASE_VERSION }}.zip" \
            dist/ \
            node_modules/ \
            prisma/ \
            package.json \
            yarn.lock \
            .yarnrc.yml

      - name: Upload artifact
        if: github.event_name != 'workflow_dispatch'
        uses: actions/upload-artifact@v6
        with:
          name: backend-zip
          path: backend-${{ env.RELEASE_VERSION }}.zip

  build-web:
    name: Build web archive
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version-file: frontend/.nvmrc
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Set version from tag
        run: npm pkg set version="${RELEASE_VERSION#v}"
        working-directory: frontend/apps/web

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --immutable

      - name: Build
        working-directory: frontend
        run: yarn build:web

      - name: Create archive
        working-directory: frontend
        run: |
          mkdir -p web-dist/apps/web/.next
          cp -r apps/web/.next/standalone/. web-dist/
          cp -r apps/web/.next/static web-dist/apps/web/.next/static
          cp -r apps/web/public web-dist/apps/web/public
          cd web-dist && zip -r "../../web-${{ env.RELEASE_VERSION }}.zip" .

      - name: Upload artifact
        if: github.event_name != 'workflow_dispatch'
        uses: actions/upload-artifact@v6
        with:
          name: web-zip
          path: web-${{ env.RELEASE_VERSION }}.zip

  build-kiosk-linux:
    name: Build kiosk (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version-file: frontend/.nvmrc
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Set version from tag
        run: npm pkg set version="${RELEASE_VERSION#v}"
        working-directory: frontend/apps/kiosk

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --immutable

      - name: Build
        working-directory: frontend/apps/kiosk
        run: yarn dist:linux

      - name: Upload artifacts
        if: github.event_name != 'workflow_dispatch'
        uses: actions/upload-artifact@v6
        with:
          name: kiosk-linux
          path: |
            frontend/apps/kiosk/dist/*.zip
            frontend/apps/kiosk/dist/*.deb

  build-kiosk-windows:
    name: Build kiosk (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version-file: frontend/.nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Set version from tag
        shell: bash
        run: npm pkg set version="${RELEASE_VERSION#v}"
        working-directory: frontend/apps/kiosk

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --immutable

      - name: Build
        working-directory: frontend/apps/kiosk
        run: yarn dist:win

      - name: Upload artifacts
        if: github.event_name != 'workflow_dispatch'
        uses: actions/upload-artifact@v6
        with:
          name: kiosk-windows
          path: |
            frontend/apps/kiosk/dist/*.exe
            frontend/apps/kiosk/dist/*.msi

  create-release:
    name: Create GitHub Release
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [build-backend, build-web, build-kiosk-linux, build-kiosk-windows]
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: release-assets/**
