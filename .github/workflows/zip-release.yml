name: ZIP Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-backend:
    name: Build backend archive
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: backend/.nvmrc
          cache: yarn
          cache-dependency-path: backend/yarn.lock

      - name: Set version from tag
        run: npm pkg set version="${GITHUB_REF_NAME#v}"
        working-directory: backend

      - name: Install dependencies
        working-directory: backend
        run: yarn install --frozen-lockfile

      - name: Build
        working-directory: backend
        run: yarn build

      - name: Install production dependencies only
        working-directory: backend
        run: yarn workspaces focus --production

      - name: Generate Prisma client
        working-directory: backend
        run: yarn prisma generate

      - name: Create archive
        working-directory: backend
        run: |
          zip -r "../backend-${{ github.ref_name }}.zip" \
            dist/ \
            node_modules/ \
            prisma/ \
            package.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-zip
          path: backend-${{ github.ref_name }}.zip

  build-web:
    name: Build web archive
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Set version from tag
        run: npm pkg set version="${GITHUB_REF_NAME#v}"
        working-directory: frontend/apps/web

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build
        working-directory: frontend
        run: yarn build:web

      - name: Create archive
        working-directory: frontend
        run: |
          mkdir -p web-dist/apps/web/.next
          cp -r apps/web/.next/standalone/. web-dist/
          cp -r apps/web/.next/static web-dist/apps/web/.next/static
          cp -r apps/web/public web-dist/apps/web/public
          cd web-dist && zip -r "../../web-${{ github.ref_name }}.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-zip
          path: web-${{ github.ref_name }}.zip

  build-kiosk-linux:
    name: Build kiosk (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Set version from tag
        run: npm pkg set version="${GITHUB_REF_NAME#v}"
        working-directory: frontend/apps/kiosk

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build
        working-directory: frontend/apps/kiosk
        run: yarn dist:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-linux
          path: |
            frontend/apps/kiosk/dist/*.zip
            frontend/apps/kiosk/dist/*.deb

  build-kiosk-windows:
    name: Build kiosk (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Set version from tag
        shell: bash
        run: npm pkg set version="${GITHUB_REF_NAME#v}"
        working-directory: frontend/apps/kiosk

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build
        working-directory: frontend/apps/kiosk
        run: yarn dist:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-windows
          path: |
            frontend/apps/kiosk/dist/*.exe
            frontend/apps/kiosk/dist/*.msi

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-backend, build-web, build-kiosk-linux, build-kiosk-windows]
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: release-assets/**
